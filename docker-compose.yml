services:
  grobid:
    image: grobid/grobid:0.9.0-crf
    container_name: dataset-finder-grobid
    ports:
      - "8070:8070"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build: ./backend
    container_name: dataset-finder-backend
    ports:
      - "8000:8000"
    environment:
      - GROBID_URL=http://grobid:8070
    volumes:
      - ./backend/cache:/app/cache
    depends_on:
      grobid:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dataset-finder-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped
