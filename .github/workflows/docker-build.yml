name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t dataset-finder-backend ./backend

      - name: Build frontend image
        run: docker build -t dataset-finder-frontend ./frontend

      - name: Validate docker compose file
        run: docker compose config